id: credentials
name: Credential Access Detection
description: Detects access to SSH keys, cloud credentials, browser data, and other sensitive files
rules:
  - id: ssh-key-access
    name: "Direct access to SSH private keys"
    severity: critical
    tags: [credentials, ssh, exfiltration]
    scope: command
    match:
      mode: regex
      pattern: '~\/\.ssh\/id_|~\/\.ssh\/config|~\/\.ssh\/known_hosts'
    recommendation: "This command reads SSH private keys directly. Verify this is intentional."

  - id: aws-credential-access
    name: "Direct access to AWS credentials"
    severity: critical
    tags: [credentials, aws, cloud]
    scope: command
    match:
      mode: regex
      pattern: '~\/\.aws\/credentials|~\/\.aws\/config'
    recommendation: "This command reads AWS credentials directly. Verify this is intentional."

  - id: gpg-key-access
    name: "Direct access to GPG keys"
    severity: critical
    tags: [credentials, gpg]
    scope: command
    match:
      mode: regex
      pattern: '~\/\.gnupg\/|~\/\.gpg'
    recommendation: "This command accesses GPG private keys. Verify this is intentional."

  - id: system-credential-files
    name: "Access to system credential files"
    severity: critical
    tags: [credentials, system]
    scope: both
    match:
      mode: regex
      pattern: '\/etc\/passwd|\/etc\/shadow'
    recommendation: "This command reads system credential files. Do NOT run it."

  - id: crypto-wallet-access
    name: "Cryptocurrency wallet access"
    severity: critical
    tags: [credentials, crypto]
    scope: both
    match:
      mode: regex
      pattern: 'wallet\.dat|\.solana\/|\.metamask|\.ethereum'
    recommendation: "This command accesses cryptocurrency wallet data. Do NOT run it."

  - id: browser-credential-data
    name: "Browser credential or cookie data access"
    severity: critical
    tags: [credentials, browser]
    scope: command
    match:
      mode: regex
      pattern: 'Login\s*Data|Cookies\.binarycookies|logins\.json|cookies\.sqlite|signons\.sqlite'
    recommendation: "This command accesses browser passwords or cookies. Do NOT run it."

  - id: browser-data-directory
    name: "Browser data directory access"
    severity: high
    tags: [credentials, browser]
    scope: command
    match:
      mode: regex
      pattern: 'Chrome.*(?:Login|Cookies|History)|Firefox.*(?:logins|cookies|places)|Safari.*(?:Cookies|History)'
    recommendation: "This command accesses browser data files. Verify this is expected."

  - id: kubernetes-config
    name: "Kubernetes config access"
    severity: high
    tags: [credentials, kubernetes, cloud]
    scope: command
    match:
      mode: regex
      pattern: '~\/\.kube\/config|KUBECONFIG'
    recommendation: "This command accesses Kubernetes cluster credentials. Verify this is expected."

  - id: docker-credentials
    name: "Docker registry credentials access"
    severity: high
    tags: [credentials, docker]
    scope: command
    match:
      mode: regex
      pattern: '~\/\.docker\/config\.json'
    recommendation: "This command accesses Docker registry authentication. Verify this is expected."

  - id: terraform-credentials
    name: "Terraform credentials access"
    severity: high
    tags: [credentials, terraform, cloud]
    scope: command
    match:
      mode: regex
      pattern: '~\/\.terraform\.d\/credentials|\.tfrc\.json'
    recommendation: "This command accesses Terraform credentials. Verify this is expected."

  - id: netrc-credentials
    name: ".netrc credentials access"
    severity: high
    tags: [credentials, netrc]
    scope: command
    match:
      mode: regex
      pattern: '~\/\.netrc|\/etc\/netrc'
    recommendation: "This command accesses .netrc which contains plaintext credentials for remote services. Verify this is expected."

  - id: npmrc-credentials
    name: ".npmrc credentials access"
    severity: high
    tags: [credentials, npm]
    scope: command
    match:
      mode: regex
      pattern: '~\/\.npmrc'
    recommendation: "This command accesses .npmrc which may contain npm authentication tokens. Verify this is expected."

  - id: ssh-credential-script
    name: "Script accesses SSH keys or cloud credentials"
    severity: critical
    tags: [credentials, ssh, cloud]
    scope: script
    match:
      mode: regex
      pattern: '~\/\.ssh\/|\.gnupg\/|\.aws\/'
      flags: gi
    recommendation: "This script accesses private keys or cloud credentials. Do NOT run it."

  - id: crypto-wallet-script
    name: "Script targets cryptocurrency wallets"
    severity: critical
    tags: [credentials, crypto]
    scope: script
    match:
      mode: regex
      pattern: 'bitcoin|ethereum|wallet\.dat|\.solana|\.metamask'
      flags: gi
    recommendation: "This script targets crypto wallet data. Do NOT run it."
